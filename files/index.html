<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IEMS — Sign In</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    /* Animated grid background */
    .bg-grid {
      position:fixed; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size:44px 44px;
    }
    /* Radial accent glow */
    .bg-glow {
      position:fixed; top:30%; left:50%; transform:translate(-50%,-50%);
      width:600px; height:400px; border-radius:50%;
      background:radial-gradient(circle, rgba(59,130,246,.06) 0%, transparent 70%);
      pointer-events:none;
    }
    /* Scanline effect */
    .scanline {
      position:fixed; inset:0; pointer-events:none; overflow:hidden;
    }
    .scanline::after {
      content:''; position:absolute; left:0; width:100%; height:2px;
      background:linear-gradient(transparent, rgba(59,130,246,.04), transparent);
      animation:scanline 6s linear infinite;
    }

    /* Login card */
    .login-wrap {
      position:relative; z-index:10;
      width:100%; max-width:400px; padding:0 20px;
      animation:fadeUp .5s var(--ease-out) both;
    }
    .login-card {
      background:var(--bg-800);
      border:1px solid var(--border);
      border-radius:var(--r-xl);
      padding:40px 36px;
      box-shadow:0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(59,130,246,.06);
      position:relative; overflow:hidden;
    }
    .login-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(59,130,246,.4), transparent);
    }

    .logo-row { display:flex; align-items:center; gap:11px; margin-bottom:30px; }
    .logo-mark {
      width:38px; height:38px; border-radius:10px;
      background:var(--accent-dim);
      border:1px solid rgba(59,130,246,.25);
      display:flex; align-items:center; justify-content:center;
    }
    .logo-text {
      font-family:var(--font-mono); font-size:17px; font-weight:500;
      letter-spacing:.12em; color:var(--txt-1);
    }
    .login-title { font-family:var(--font-display); font-size:24px; font-weight:700; margin-bottom:5px; }
    .login-sub   { font-size:13.5px; color:var(--txt-3); margin-bottom:28px; }

    .login-form  { display:flex; flex-direction:column; gap:16px; }
    .login-hint  { text-align:center; font-size:12px; color:var(--txt-3); margin-top:18px; line-height:1.5; }
    .submit-btn  { padding:12px; font-size:14px; font-weight:600; letter-spacing:.02em; }

    .divider { border:none; border-top:1px solid var(--border); margin:4px 0; }

    /* Role demo pills */
    .demo-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .demo-pill {
      flex:1; min-width:120px; padding:10px 12px; border-radius:var(--r-md); cursor:pointer;
      border:1px solid var(--border); background:var(--bg-700);
      transition:all .18s; text-align:center;
    }
    .demo-pill:hover { border-color:var(--accent); background:var(--accent-dim); }
    .demo-pill .dp-role { font-size:11px; font-weight:600; letter-spacing:.08em; color:var(--txt-3); text-transform:uppercase; }
    .demo-pill .dp-email{ font-size:12.5px; color:var(--txt-2); margin-top:2px; font-family:var(--font-mono); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="scanline"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-row">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 10l4-4 4 4 4-4" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 15l4-4 4 4 4-4" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
          </svg>
        </div>
        <span class="logo-text">IEMS</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Industrial Equipment Management System</p>

      <form class="login-form" id="loginForm">
        <div class="field">
          <label>Email address</label>
          <input id="emailInput" class="input" type="email" placeholder="you@factory.com" required autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="passInput" class="input" type="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">
          Sign in
        </button>
      </form>

      <p class="login-hint">Role is determined by your account.<br>Contact your system admin for access.</p>
    </div>
  </div>

  <script type="module">
    import { api } from './js/api.js';
    import { setUser } from './js/ui.js';

    window.fillDemo = (email, pass) => {
      document.getElementById('emailInput').value = email;
      document.getElementById('passInput').value  = pass;
    };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('submitBtn');
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div>';

      try {
        const res = await api.login(
          document.getElementById('emailInput').value,
          document.getElementById('passInput').value
        );
        localStorage.setItem('iems_token', res.token);
        setUser(res.user);
        window.location.href = res.user.role === 'ADMIN' ? 'pages/admin-dashboard.html' : 'pages/technician.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });

    // Already logged in?
    const token = localStorage.getItem('iems_token');
    if (token) {
      api.me().then(r => {
        setUser(r.data);
        window.location.href = r.data.role === 'ADMIN' ? 'pages/admin-dashboard.html' : 'pages/technician.html';
      }).catch(() => {});
    }
  </script>
</body>
</html>
