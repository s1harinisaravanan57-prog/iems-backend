<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#0b1120"/>
  <title>IEMS — Technician</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    /* ─── Mobile light-mode override ─── */
    body {
      background:#f0f4f8;
      color:#0f172a;
      max-width:480px;
      margin:0 auto;
    }
    :root {
      --m-bg:        #f0f4f8;
      --m-surface:   #ffffff;
      --m-surface-2: #f8fafc;
      --m-border:    #e2e8f0;
      --m-txt-1:     #0f172a;
      --m-txt-2:     #334155;
      --m-txt-3:     #64748b;
      --m-txt-4:     #94a3b8;
    }

    /* Views */
    .view { display:none; flex-direction:column; min-height:100vh; }
    .view.active { display:flex; }

    /* ─── Header ─── */
    .mob-header {
      background:var(--bg-900);
      padding:20px 16px 16px;
      flex-shrink:0;
      position:sticky; top:0; z-index:10;
    }
    .mob-header-row { display:flex; justify-content:space-between; align-items:center; }
    .mob-greeting  { font-size:12px; color:#64748b; }
    .mob-name      { font-family:var(--font-display); font-size:20px; font-weight:700; color:#f1f5f9; }
    .mob-role-pill { background:rgba(59,130,246,.15); color:#60a5fa; font-size:10px; font-weight:600; padding:3px 10px; border-radius:20px; letter-spacing:.06em; }
    .mob-logout    { padding:6px; border-radius:8px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:#64748b; }

    /* ─── Stats bar ─── */
    .stats-bar { display:flex; gap:8px; padding:12px 16px 14px; background:var(--bg-900); border-bottom:1px solid rgba(255,255,255,.04); }
    .stat-pill { flex:1; background:rgba(255,255,255,.04); border-radius:10px; padding:10px 8px; text-align:center; }
    .stat-num  { display:block; font-family:var(--font-mono); font-size:20px; font-weight:500; line-height:1; }
    .stat-lbl  { display:block; font-size:9.5px; color:#64748b; margin-top:4px; text-transform:uppercase; letter-spacing:.06em; }

    /* ─── Machine list ─── */
    .mob-content { flex:1; padding:16px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
    .mob-section-title { font-size:11px; font-weight:700; color:var(--m-txt-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
    .mob-section-title span { background:var(--m-border); color:var(--m-txt-3); font-size:10px; padding:1px 8px; border-radius:20px; }

    .machine-card {
      background:var(--m-surface); border-radius:14px; padding:16px;
      border-left:4px solid var(--accent);
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      cursor:pointer; transition:transform .15s, box-shadow .15s;
      display:block; position:relative; overflow:hidden;
    }
    .machine-card:hover, .machine-card:active { transform:scale(.99); box-shadow:0 4px 16px rgba(0,0,0,.1); }
    .machine-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .mc-name   { font-size:15.5px; font-weight:600; color:var(--m-txt-1); }
    .mc-meta   { font-size:12px; color:var(--m-txt-3); margin-top:2px; }
    .mc-chevron { color:var(--m-txt-4); margin-top:2px; flex-shrink:0; }
    .mc-foot   { display:flex; align-items:center; justify-content:space-between; }
    .mc-date   { font-family:var(--font-mono); font-size:11px; color:var(--m-txt-4); }

    /* ─── Detail view ─── */
    .detail-header {
      background:var(--bg-900); padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      flex-shrink:0; position:sticky; top:0; z-index:10;
    }
    .back-btn { display:flex; align-items:center; gap:4px; color:#94a3b8; font-size:14px; background:none; border:none; cursor:pointer; padding:4px 0; }
    .detail-eq-name { font-size:15px; font-weight:600; color:#f1f5f9; flex:1; }
    .detail-eq-meta { font-size:11.5px; color:#64748b; }

    /* Gauge */
    .gauge-section {
      background:var(--m-surface-2); border-bottom:1px solid var(--m-border);
      padding:18px 20px; display:flex; align-items:center; gap:20px;
    }
    .gauge-label  { font-size:16px; font-weight:600; color:var(--m-txt-1); }
    .gauge-sub    { font-size:12px; color:var(--m-txt-3); margin-top:2px; }
    .gauge-alert  { display:flex; align-items:center; gap:5px; font-size:12px; color:#ef4444; background:rgba(239,68,68,.08); padding:5px 10px; border-radius:20px; margin-top:6px; border:1px solid rgba(239,68,68,.15); width:fit-content; }

    /* Tabs */
    .mob-tabs { display:flex; background:var(--m-surface); border-bottom:1px solid var(--m-border); }
    .mob-tab { flex:1; padding:13px; font-size:13.5px; font-weight:500; background:none; border:none; color:var(--m-txt-3); border-bottom:2px solid transparent; cursor:pointer; transition:all .15s; }
    .mob-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .tab-content { display:none; flex-direction:column; gap:14px; padding:18px 16px; flex:1; overflow-y:auto; background:var(--m-bg); }
    .tab-content.active { display:flex; }

    /* Form */
    .mob-field { display:flex; flex-direction:column; gap:6px; }
    .mob-field label { font-size:12.5px; font-weight:500; color:var(--m-txt-2); }
    .mob-input, .mob-select, .mob-textarea {
      background:var(--m-surface); border:1.5px solid var(--m-border); border-radius:12px;
      padding:12px 14px; font-size:14px; color:var(--m-txt-1);
      font-family:var(--font-body); outline:none; width:100%;
      transition:border-color .2s;
    }
    .mob-input:focus, .mob-select:focus, .mob-textarea:focus { border-color:var(--accent); }
    .mob-textarea { resize:vertical; min-height:90px; }

    .submit-bar {
      position:sticky; bottom:0; background:var(--m-surface);
      padding:14px 16px; border-top:1px solid var(--m-border);
      box-shadow:0 -4px 20px rgba(0,0,0,.08);
    }
    .submit-btn-mob {
      width:100%; padding:15px; font-size:15px; font-weight:600;
      background:var(--accent); color:#fff; border:none; border-radius:14px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 14px rgba(59,130,246,.35); transition:all .2s;
    }
    .submit-btn-mob:hover { background:#2563eb; transform:translateY(-1px); }
    .submit-btn-mob:disabled { opacity:.6; transform:none; }

    .success-banner {
      display:flex; align-items:center; gap:8px;
      background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.2);
      color:#10b981; padding:12px 14px; border-radius:10px;
      font-size:13px; font-weight:500;
    }

    /* History */
    .history-item { background:var(--m-surface); border-radius:12px; padding:14px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .hi-desc { font-size:13.5px; color:var(--m-txt-1); line-height:1.5; }
    .hi-meta { font-family:var(--font-mono); font-size:11px; color:var(--m-txt-4); margin-top:4px; }
  </style>
</head>
<body>
<div id="toast-container"></div>

<!-- ═══ LIST VIEW ═════════════════════════════════════════════════════ -->
<div class="view active" id="listView">
  <div class="mob-header">
    <div class="mob-header-row">
      <div>
        <div class="mob-greeting">Welcome back,</div>
        <div class="mob-name" id="techName">Technician</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="mob-role-pill">TECH</div>
        <button class="mob-logout" id="logoutBtn">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-pill"><span class="stat-num" id="statTotal">—</span><span class="stat-lbl">Total</span></div>
    <div class="stat-pill"><span class="stat-num" style="color:#10b981" id="statOpt">—</span><span class="stat-lbl">Optimal</span></div>
    <div class="stat-pill"><span class="stat-num" style="color:#f59e0b" id="statWarn">—</span><span class="stat-lbl">Warning</span></div>
    <div class="stat-pill"><span class="stat-num" style="color:#ef4444" id="statCrit">—</span><span class="stat-lbl">Critical</span></div>
  </div>

  <div class="mob-content">
    <div class="mob-section-title">Your Equipment <span id="eqCount">0</span></div>
    <div id="machineList">
      <div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ═══ DETAIL VIEW ═══════════════════════════════════════════════════ -->
<div class="view" id="detailView">
  <div class="detail-header">
    <button class="back-btn" id="backBtn">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    <div>
      <div class="detail-eq-name" id="detailEqName">—</div>
      <div class="detail-eq-meta" id="detailEqMeta">—</div>
    </div>
    <div id="detailStatus"></div>
  </div>

  <div class="gauge-section">
    <canvas id="gaugeCanvas" width="120" height="120"></canvas>
    <div>
      <div class="gauge-label">Health Score</div>
      <div class="gauge-sub" id="gaugeSub">Based on 0 logs</div>
      <div class="gauge-alert hidden" id="gaugeAlert">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span id="gaugeAlertText"></span>
      </div>
    </div>
  </div>

  <div class="mob-tabs">
    <button class="mob-tab active" data-tab="log">Log Condition</button>
    <button class="mob-tab" data-tab="history">History</button>
  </div>

  <!-- Log form -->
  <div class="tab-content active" id="tab-log">
    <div class="mob-field">
      <label>Description *</label>
      <textarea id="fDesc" class="mob-textarea" placeholder="What did you observe or do?"></textarea>
    </div>
    <div class="mob-field">
      <label>Worker Name</label>
      <select id="fTechId" class="mob-select">
        <option value="">(Self) Logged in User</option>
      </select>
    </div>
    <div class="mob-field">
      <label>Scheduled Date</label>
      <input id="fDate" class="mob-input" type="date"/>
    </div>
    <div class="mob-field">
      <label>Result</label>
      <select id="fResult" class="mob-select">
        <option value="PENDING">Pending follow-up</option>
        <option value="DONE">Completed ✓</option>
        <option value="ESCALATED">Escalate to admin ⚠</option>
      </select>
    </div>
    <div id="logError" class="hidden" style="color:#ef4444;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);padding:10px 12px;border-radius:10px;font-size:13px"></div>
    <div id="logSuccess" class="success-banner hidden">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#10b981" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
      Log submitted successfully!
    </div>
  </div>

  <!-- History -->
  <div class="tab-content" id="tab-history">
    <div id="historyList"><div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- Sticky submit button (only visible on log tab) -->
  <div class="submit-bar">
    <button class="submit-btn-mob" id="submitLogBtn">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Submit Log
    </button>
  </div>
</div>

<script type="module">
import { api } from '../js/api.js';
import { toast, statusBadge, resultBadge, getUser, logout } from '../js/ui.js';

// ── Auth ────────────────────────────────────────────────────────────
const user = getUser();
if (!user || user.role !== 'TECHNICIAN') { window.location.href = '../index.html'; }
document.getElementById('techName').textContent = user?.name || 'Technician';
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('backBtn').addEventListener('click', showList);

// ── State ───────────────────────────────────────────────────────────
let equipment = [], currentEq = null, history = [], workers = [];

// ── Load data ──────────────────────────────────────────────────
async function loadData() {
  try {
    const [eqRes, usrRes] = await Promise.all([api.equipmentList(), api.usersList()]);
    equipment = eqRes.data || [];
    workers = usrRes.data || [];
    renderStats();
    renderList();

    const techSelect = document.getElementById('fTechId');
    if (techSelect && workers.length) {
      techSelect.innerHTML = '<option value="">(Self) ' + (user?.name || 'Logged in User') + '</option>' +
        workers.map(w => `<option value="${w.id}">${w.name} (${w.role})</option>`).join('');
    }
  } catch(e) {
    document.getElementById('machineList').innerHTML = `<p style="color:#ef4444;text-align:center;padding:20px">${e.message}</p>`;
  }
}
loadData();

function renderStats() {
  const counts = {};
  equipment.forEach(e => { counts[e.status] = (counts[e.status]||0)+1; });
  document.getElementById('statTotal').textContent = equipment.length;
  document.getElementById('statOpt').textContent   = counts.OPTIMAL  || 0;
  document.getElementById('statWarn').textContent  = counts.WARNING  || 0;
  document.getElementById('statCrit').textContent  = counts.CRITICAL || 0;
}

const STATUS_COLORS = { OPTIMAL:'#10b981', WARNING:'#f59e0b', CRITICAL:'#ef4444', IN_REPAIR:'#8b5cf6', SCRAPPED:'#64748b' };

function renderList() {
  document.getElementById('eqCount').textContent = equipment.length;
  if (!equipment.length) {
    document.getElementById('machineList').innerHTML = '<p style="color:#94a3b8;text-align:center;padding:40px 0;font-size:14px">No equipment assigned yet</p>';
    return;
  }
  document.getElementById('machineList').innerHTML = equipment.map((eq,i) => `
    <div class="machine-card anim-fade-up" style="animation-delay:${i*40}ms;border-left-color:${STATUS_COLORS[eq.status]||'#3b82f6'}" data-id="${eq.id}">
      <div class="machine-card-top">
        <div>
          <div class="mc-name">${eq.name}</div>
          <div class="mc-meta">${eq.type||'Equipment'} · ${eq.location||'Unknown zone'}</div>
        </div>
        <svg class="mc-chevron" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="mc-foot">
        ${statusBadge(eq.status)}
        <span class="mc-date">${(eq.created_at||'').slice(0,10)}</span>
      </div>
    </div>`).join('');

  document.querySelectorAll('.machine-card').forEach(card => {
    card.addEventListener('click', () => {
      const eq = equipment.find(e => e.id === card.dataset.id);
      if (eq) showDetail(eq);
    });
  });
}

// ── Detail view ─────────────────────────────────────────────────────
async function showDetail(eq) {
  currentEq = eq;
  document.getElementById('detailEqName').textContent = eq.name;
  document.getElementById('detailEqMeta').textContent = `${eq.type||'Equipment'} · ${eq.location||'Unknown zone'}`;
  document.getElementById('detailStatus').innerHTML = statusBadge(eq.status);
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fTechId').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fResult').value = 'PENDING';
  document.getElementById('logError').classList.add('hidden');
  document.getElementById('logSuccess').classList.add('hidden');

  document.getElementById('listView').classList.remove('active');
  document.getElementById('detailView').classList.add('active');

  // Load history
  document.getElementById('historyList').innerHTML = '<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>';
  try {
    const res = await api.maintenanceList({ equipment_id: eq.id });
    history = res.data || [];
    renderGauge(history);
    renderHistory(history);
  } catch(e) {
    document.getElementById('historyList').innerHTML = `<p style="color:#ef4444;text-align:center;padding:20px">${e.message}</p>`;
  }
}

function showList() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('listView').classList.add('active');
}

// ── Health gauge ────────────────────────────────────────────────────
function renderGauge(logs) {
  const escalated = logs.filter(l => l.result === 'ESCALATED').length;
  const score = Math.max(20, 95 - escalated * 15);
  const color = score >= 70 ? '#10b981' : score >= 40 ? '#f59e0b' : '#ef4444';

  document.getElementById('gaugeSub').textContent = `Based on ${logs.length} log${logs.length!==1?'s':''}`;
  const alertEl = document.getElementById('gaugeAlert');
  if (escalated > 0) {
    document.getElementById('gaugeAlertText').textContent = `${escalated} escalated issue${escalated>1?'s':''}`;
    alertEl.classList.remove('hidden');
  } else {
    alertEl.classList.add('hidden');
  }

  const canvas = document.getElementById('gaugeCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,120,120);

  const cx=60, cy=60, r=48, lw=10;
  const start = -Math.PI*0.75, end = Math.PI*0.75;
  const filled = start + (end-start)*(score/100);

  // Track
  ctx.beginPath(); ctx.arc(cx,cy,r,start,end);
  ctx.strokeStyle='rgba(148,163,184,.1)'; ctx.lineWidth=lw;
  ctx.lineCap='round'; ctx.stroke();

  // Fill
  ctx.beginPath(); ctx.arc(cx,cy,r,start,filled);
  ctx.strokeStyle=color; ctx.lineWidth=lw;
  ctx.lineCap='round'; ctx.stroke();

  // Score text
  ctx.fillStyle=color; ctx.font='700 22px DM Sans,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(score, cx, cy-5);
  ctx.fillStyle='#94a3b8'; ctx.font='12px DM Sans,sans-serif';
  ctx.fillText('/ 100', cx, cy+14);
}

function renderHistory(logs) {
  document.getElementById('historyList').innerHTML = logs.length
    ? logs.map(l => `
        <div class="history-item anim-fade-up">
          <div style="flex:1">
            <div class="hi-desc">${l.description}</div>
            <div class="hi-meta">${(l.scheduled_date||'').slice(0,10)}</div>
          </div>
          ${resultBadge(l.result)}
        </div>`).join('')
    : '<p style="color:#94a3b8;text-align:center;padding:40px 0;font-size:14px">No logs yet</p>';
}

// ── Tabs ────────────────────────────────────────────────────────────
document.querySelectorAll('.mob-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    document.getElementById(`tab-${tab.dataset.tab}`)?.classList.add('active');
    document.getElementById('submitLogBtn').style.display = tab.dataset.tab === 'log' ? 'flex' : 'none';
  });
});

// ── Submit log ──────────────────────────────────────────────────────
document.getElementById('submitLogBtn').addEventListener('click', async () => {
  const btn  = document.getElementById('submitLogBtn');
  const errEl= document.getElementById('logError');
  const sucEl= document.getElementById('logSuccess');
  const desc = document.getElementById('fDesc').value.trim();

  errEl.classList.add('hidden'); sucEl.classList.add('hidden');
  if (!desc) { errEl.textContent='Description is required'; errEl.classList.remove('hidden'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2.5px;border-color:rgba(255,255,255,.3);border-top-color:#fff"></div>';

  try {
    await api.maintenanceCreate({
      equipment_id: currentEq.id,
      technician_id: document.getElementById('fTechId').value || undefined,
      description: desc,
      scheduled_date: document.getElementById('fDate').value,
      result: document.getElementById('fResult').value,
    });
    document.getElementById('fTechId').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fResult').value = 'PENDING';
    sucEl.classList.remove('hidden');

    // Refresh history + gauge
    const res = await api.maintenanceList({ equipment_id: currentEq.id });
    history = res.data || [];
    renderGauge(history);
    renderHistory(history);
    setTimeout(() => sucEl.classList.add('hidden'), 4000);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Submit Log`;
  }
});
</script>
</body>
</html>
